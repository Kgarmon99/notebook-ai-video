<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7c3aed">
    <title>Notebook AI Video | Turn Ideas Into Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f8fafc;
            position: relative;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .style-btn {
            transition: all 0.2s;
        }
        .style-btn.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }
        #video-canvas {
            width: 100%;
            max-width: 640px;
            aspect-ratio: 16/9;
            background: #1e293b;
            border-radius: 12px;
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            transition: width 0.3s;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header style="background: linear-gradient(135deg, #7c3aed, #a855f7); padding: 24px 20px; color: white;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 48px; height: 48px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-video" style="font-size: 24px;"></i>
                </div>
                <div>
                    <h1 style="font-size: 24px; font-weight: 800; margin: 0;">Notebook AI</h1>
                    <p style="font-size: 13px; opacity: 0.9; margin: 0;">Turn ideas into videos</p>
                </div>
            </div>
        </header>

        <main style="padding: 20px;">
            
            <!-- Input Section -->
            <div class="card" style="padding: 24px; margin-bottom: 20px;">
                <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #1e293b;">
                    <i class="fas fa-lightbulb" style="color: #fbbf24; margin-right: 8px;"></i>
                    What should we create?
                </h2>
                <p style="font-size: 14px; color: #64748b; margin-bottom: 20px;">
                    Enter your content. Our AI will generate a video with voiceover and visuals.
                </p>

                <textarea 
                    id="content-input" 
                    placeholder="Enter your content here..."
                    style="width: 100%; height: 150px; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; resize: vertical; font-family: inherit; margin-bottom: 20px; line-height: 1.6;"></textarea>

                <!-- Style Selection -->
                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px;">Video Style</label>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="setStyle('professional')" class="style-btn active" data-style="professional" style="flex: 1; padding: 14px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                            <i class="fas fa-briefcase" style="display: block; margin-bottom: 6px; font-size: 18px;"></i>
                            Professional
                        </button>
                        <button onclick="setStyle('casual')" class="style-btn" data-style="casual" style="flex: 1; padding: 14px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                            <i class="fas fa-coffee" style="display: block; margin-bottom: 6px; font-size: 18px;"></i>
                            Casual
                        </button>
                        <button onclick="setStyle('energetic')" class="style-btn" data-style="energetic" style="flex: 1; padding: 14px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                            <i class="fas fa-bolt" style="display: block; margin-bottom: 6px; font-size: 18px;"></i>
                            Energetic
                        </button>
                    </div>
                </div>

                <!-- Options -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;">
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px;">Duration</label>
                        <select id="duration" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: white;">
                            <option value="15">15 seconds</option>
                            <option value="30" selected>30 seconds</option>
                            <option value="60">60 seconds</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px;">Voice</label>
                        <select id="voice" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: white;">
                            <option value="default">Default</option>
                            <option value="male">Male</option>
                            <option value="female">Female</option>
                        </select>
                    </div>
                </div>

                <!-- Generate Button -->
                <button onclick="startVideoGeneration()" id="generate-btn" class="btn-primary" style="width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; cursor: pointer;">
                    <i class="fas fa-magic" style="margin-right: 8px;"></i>
                    Create AI Video
                </button>

                <!-- Progress Bar -->
                <div id="progress-container" style="display: none; margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span id="progress-text" style="font-size: 13px; color: #64748b;">Initializing...</span>
                        <span id="progress-percent" style="font-size: 13px; font-weight: 600; color: #7c3aed;">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <!-- Templates -->
            <div class="card" style="padding: 20px; margin-bottom: 20px; background: linear-gradient(135deg, #fef3c7, #fde68a); border: none;">
                <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #92400e;">
                    <i class="fas fa-star" style="margin-right: 6px;"></i>
                    Quick Templates
                </h3>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button onclick="loadTemplate('pitch')" style="text-align: left; padding: 14px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-rocket" style="color: #7c3aed; margin-right: 10px;"></i>
                        Startup Investor Pitch
                    </button>
                    <button onclick="loadTemplate('product')" style="text-align: left; padding: 14px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-box-open" style="color: #7c3aed; margin-right: 10px;"></i>
                        Product Demo Video
                    </button>
                    <button onclick="loadTemplate('training')" style="text-align: left; padding: 14px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-chalkboard-teacher" style="color: #7c3aed; margin-right: 10px;"></i>
                        Training & Onboarding
                    </button>
                </div>
            </div>

            <!-- Preview Canvas (hidden initially) -->
            <div id="preview-section" style="display: none; margin-bottom: 20px;">
                <div class="card" style="padding: 20px;">
                    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1e293b;">
                        <i class="fas fa-eye" style="color: #7c3aed; margin-right: 8px;"></i>
                        Preview
                    </h3>
                    <canvas id="video-canvas" width="640" height="360"></canvas>
                    <div style="display: flex; gap: 10px; margin-top: 16px;">
                        <button onclick="playPreview()" id="play-btn" style="flex: 1; padding: 12px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">
                            <i class="fas fa-play" style="margin-right: 6px;"></i>Play Preview
                        </button>
                        <button onclick="downloadVideo()" id="download-btn" style="flex: 1; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; display: none;">
                            <i class="fas fa-download" style="margin-right: 6px;"></i>Download MP4
                        </button>
                    </div>
                </div>
            </div>

            <!-- My Videos -->
            <div id="videos-section" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="font-size: 20px; font-weight: 700; color: #1e293b;">My Videos</h2>
                    <button onclick="clearAllVideos()" style="font-size: 13px; color: #64748b; background: none; border: none; cursor: pointer;">
                        Clear All
                    </button>
                </div>
                <div id="videos-list"></div>
            </div>

            <!-- Empty State -->
            <div id="empty-state" style="text-align: center; padding: 40px 20px;">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #e0e7ff, #c7d2fe); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i class="fas fa-film" style="font-size: 32px; color: #7c3aed;"></i>
                </div>
                <h3 style="font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 8px;">No videos yet</h3>
                <p style="font-size: 14px; color: #64748b;">Create your first AI video above</p>
            </div>

        </main>
    </div>

    <script>
        // State
        let currentStyle = 'professional';
        let videos = JSON.parse(localStorage.getItem('notebookVideos') || '[]');
        let canvas, ctx;
        let mediaRecorder;
        let recordedChunks = [];
        let isGenerating = false;

        // Templates
        const templates = {
            pitch: `EcoPackage Solutions - Investor Pitch

The Problem:
E-commerce packaging creates 15 million tons of plastic waste annually. Current eco-friendly options cost 2 to 3 times more than plastic.

Our Solution:
Biodegradable packaging made from agricultural waste that costs 30 percent less than plastic alternatives.

Key Metrics:
2.3 billion dollar addressable market by 2026.
Patent-pending material formula with 18-month moat.
3 letters of intent signed with major retailers.
Pilot program showing 40 percent cost savings.

We are raising 750 thousand dollars to scale manufacturing.`,

            product: `TaskFlow Pro - Product Demo

What is TaskFlow?
The AI-powered project management tool that understands how your team works.

Key Features:

Smart Task Prioritization. AI analyzes deadlines and suggests what to work on next.

Automatic Workload Balancing. Prevents burnout by distributing tasks evenly.

Deadline Prediction. Uses historical data to predict if you will hit deadlines.

One-Click Integrations. Connects with Slack, GitHub, and 50 plus other tools.

Perfect for remote teams of 5 to 50 people who are tired of tools that create more work than they save.`,

            training: `Customer Service Excellence - Training

Welcome to Module 1: The Foundations

The 4 Pillars of Great Service:

Number 1: Listen Actively. Do not interrupt the customer. Take notes on key points. Confirm understanding before responding.

Number 2: Empathize Genuinely. Acknowledge their frustration. Put yourself in their shoes. Remember, they are upset at the situation, not you.

Number 3: Solve Efficiently. Aim for first-contact resolution. Know when to escalate. Set clear expectations on timeline.

Number 4: Follow Up Proactively. Check in after 24 hours. Ask for feedback. Document the interaction.

Remember: Every interaction is a chance to turn a frustrated customer into a loyal advocate.`
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            canvas = document.getElementById('video-canvas');
            ctx = canvas.getContext('2d');
            displayVideos();
        });

        function setStyle(style) {
            currentStyle = style;
            document.querySelectorAll('.style-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-style="${style}"]`).classList.add('active');
        }

        function loadTemplate(type) {
            document.getElementById('content-input').value = templates[type];
            if (type === 'pitch') setStyle('professional');
            if (type === 'product') setStyle('energetic');
            if (type === 'training') setStyle('casual');
        }

        function updateProgress(text, percent) {
            document.getElementById('progress-text').textContent = text;
            document.getElementById('progress-percent').textContent = percent + '%';
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        async function startVideoGeneration() {
            const content = document.getElementById('content-input').value.trim();
            if (!content) {
                alert('Please enter some content first!');
                return;
            }

            if (isGenerating) return;
            isGenerating = true;

            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="margin-right: 8px;"></i>Generating...';

            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('preview-section').style.display = 'none';
            document.getElementById('download-btn').style.display = 'none';

            try {
                updateProgress('Analyzing content...', 10);
                await sleep(500);

                updateProgress('Generating visuals...', 30);
                await generateVisuals(content);
                await sleep(500);

                updateProgress('Preparing audio...', 50);
                await sleep(500);

                updateProgress('Recording video...', 70);
                await recordVideo(content);
                await sleep(500);

                updateProgress('Finalizing...', 90);
                await sleep(500);

                updateProgress('Complete!', 100);

                // Show preview
                document.getElementById('preview-section').style.display = 'block';
                document.getElementById('download-btn').style.display = 'block';

                // Save video data
                const videoData = {
                    id: Date.now(),
                    title: content.split('\n')[0].substring(0, 60) || 'Untitled',
                    content: content,
                    style: currentStyle,
                    duration: document.getElementById('duration').value,
                    createdAt: new Date().toLocaleDateString(),
                    thumbnail: canvas.toDataURL('image/jpeg', 0.5)
                };

                videos.unshift(videoData);
                localStorage.setItem('notebookVideos', JSON.stringify(videos));
                displayVideos();

                showNotification('Video created successfully! 🎬');

            } catch (error) {
                console.error('Generation error:', error);
                alert('Error creating video. Please try again.');
            } finally {
                isGenerating = false;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic" style="margin-right: 8px;"></i>Create AI Video';
                setTimeout(() => {
                    document.getElementById('progress-container').style.display = 'none';
                    updateProgress('Initializing...', 0);
                }, 2000);
            }
        }

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        function generateVisuals(content) {
            return new Promise((resolve) => {
                const lines = content.split('\n').filter(l => l.trim());
                const title = lines[0] || 'Untitled';
                
                // Clear canvas
                ctx.fillStyle = getBackgroundColor();
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Draw decorative elements based on style
                drawDecorations();

                // Draw title
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 36px Inter, sans-serif';
                ctx.textAlign = 'center';
                wrapText(ctx, title, canvas.width / 2, canvas.height / 2 - 20, canvas.width - 80, 44);

                // Draw subtitle
                ctx.font = '20px Inter, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.fillText('AI Generated Video', canvas.width / 2, canvas.height - 40);

                resolve();
            });
        }

        function getBackgroundColor() {
            const colors = {
                professional: '#1e293b',
                casual: '#0f766e',
                energetic: '#7c3aed'
            };
            return colors[currentStyle] || '#1e293b';
        }

        function drawDecorations() {
            ctx.save();
            
            // Draw geometric shapes based on style
            if (currentStyle === 'professional') {
                // Subtle gradient circles
                for (let i = 0; i < 3; i++) {
                    const gradient = ctx.createRadialGradient(
                        Math.random() * canvas.width,
                        Math.random() * canvas.height,
                        0,
                        Math.random() * canvas.width,
                        Math.random() * canvas.height,
                        200
                    );
                    gradient.addColorStop(0, 'rgba(124, 58, 237, 0.3)');
                    gradient.addColorStop(1, 'rgba(124, 58, 237, 0)');
                    ctx.fillStyle = gradient;
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 150, 0, Math.PI * 2);
                    ctx.fill();
                }
            } else if (currentStyle === 'energetic') {
                // Bold diagonal lines
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 3;
                for (let i = 0; i < 10; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * 40);
                    ctx.lineTo(canvas.width, i * 40 + 100);
                    ctx.stroke();
                }
            } else {
                // Soft organic shapes
                for (let i = 0; i < 5; i++) {
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.05)';
                    ctx.beginPath();
                    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 80 + Math.random() * 60, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
            
            ctx.restore();
        }

        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let lines = [];

            for (let i = 0; i < words.length; i++) {
                const testLine = line + words[i] + ' ';
                const metrics = ctx.measureText(testLine);
                if (metrics.width > maxWidth && i > 0) {
                    lines.push(line);
                    line = words[i] + ' ';
                } else {
                    line = testLine;
                }
            }
            lines.push(line);

            const startY = y - ((lines.length - 1) * lineHeight) / 2;
            lines.forEach((l, i) => {
                ctx.fillText(l.trim(), x, startY + i * lineHeight);
            });
        }

        async function recordVideo(content) {
            return new Promise(async (resolve, reject) => {
                recordedChunks = [];
                
                // Set up media recorder
                const stream = canvas.captureStream(30);
                
                // Add audio track if supported
                try {
                    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioContext.createOscillator();
                    const gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.frequency.value = 0;
                    gainNode.gain.value = 0.001;
                    oscillator.start();
                    
                    const dest = audioContext.createMediaStreamDestination();
                    gainNode.connect(dest);
                    
                    const audioTrack = dest.stream.getAudioTracks()[0];
                    stream.addTrack(audioTrack);
                } catch (e) {
                    console.log('Audio setup failed:', e);
                }

                mediaRecorder = new MediaRecorder(stream, {
                    mimeType: 'video/webm;codecs=vp9'
                });

                mediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) {
                        recordedChunks.push(e.data);
                    }
                };

                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    window.generatedVideoBlob = blob;
                    window.generatedVideoUrl = URL.createObjectURL(blob);
                    resolve();
                };

                mediaRecorder.onerror = (e) => {
                    reject(e);
                };

                // Start recording
                mediaRecorder.start(100);

                // Animate for duration
                const duration = parseInt(document.getElementById('duration').value) * 1000;
                const startTime = Date.now();

                function animate() {
                    const elapsed = Date.now() - startTime;
                    const progress = elapsed / duration;

                    if (progress < 1) {
                        // Redraw with animation
                        ctx.fillStyle = getBackgroundColor();
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                        drawDecorations();

                        // Animate title with subtle movement
                        ctx.fillStyle = '#ffffff';
                        ctx.font = 'bold 36px Inter, sans-serif';
                        ctx.textAlign = 'center';
                        const bounce = Math.sin(progress * Math.PI * 2) * 5;
                        wrapText(ctx, content.split('\n')[0] || 'Untitled', canvas.width / 2, canvas.height / 2 - 20 + bounce, canvas.width - 80, 44);

                        // Progress bar at bottom
                        ctx.fillStyle = 'rgba(255,255,255,0.2)';
                        ctx.fillRect(40, canvas.height - 30, canvas.width - 80, 6);
                        ctx.fillStyle = '#a855f7';
                        ctx.fillRect(40, canvas.height - 30, (canvas.width - 80) * progress, 6);

                        requestAnimationFrame(animate);
                    } else {
                        mediaRecorder.stop();
                    }
                }

                animate();

                // Speak the content using Web Speech API
                speakContent(content);
            });
        }

        function speakContent(text) {
            if ('speechSynthesis' in window) {
                // Cancel any ongoing speech
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                const voiceSelect = document.getElementById('voice').value;
                
                // Set voice properties based on style
                if (currentStyle === 'professional') {
                    utterance.rate = 0.9;
                    utterance.pitch = 1;
                } else if (currentStyle === 'energetic') {
                    utterance.rate = 1.1;
                    utterance.pitch = 1.1;
                } else {
                    utterance.rate = 1;
                    utterance.pitch = 1;
                }

                // Try to select appropriate voice
                const voices = window.speechSynthesis.getVoices();
                if (voiceSelect === 'male') {
                    const maleVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('James'));
                    if (maleVoice) utterance.voice = maleVoice;
                } else if (voiceSelect === 'female') {
                    const femaleVoice = voices.find(v => v.name.includes('Female') || v.name.includes('Samantha') || v.name.includes('Victoria'));
                    if (femaleVoice) utterance.voice = femaleVoice;
                }

                window.speechSynthesis.speak(utterance);
            }
        }

        function playPreview() {
            if (window.generatedVideoUrl) {
                const video = document.createElement('video');
                video.src = window.generatedVideoUrl;
                video.controls = true;
                video.style.width = '100%';
                video.style.borderRadius = '12px';
                
                const modal = document.createElement('div');
                modal.style.cssText = `
                    position: fixed;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: rgba(0,0,0,0.9);
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    padding: 20px;
                    z-index: 1000;
                `;
                modal.innerHTML = '<div style="width: 100%; max-width: 640px;"></div>';
                modal.querySelector('div').appendChild(video);
                
                modal.onclick = (e) => {
                    if (e.target === modal) {
                        video.pause();
                        modal.remove();
                    }
                };
                
                document.body.appendChild(modal);
                video.play();
            }
        }

        function downloadVideo() {
            if (window.generatedVideoBlob) {
                const url = URL.createObjectURL(window.generatedVideoBlob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `notebook-video-${Date.now()}.webm`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showNotification('Video downloaded! 📥');
            }
        }

        function displayVideos() {
            const section = document.getElementById('videos-section');
            const list = document.getElementById('videos-list');
            const empty = document.getElementById('empty-state');

            if (videos.length === 0) {
                section.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            section.style.display = 'block';
            empty.style.display = 'none';

            list.innerHTML = videos.map(video => `
                <div class="card" style="padding: 16px; margin-bottom: 16px;">
                    <div style="display: flex; gap: 16px;">
                        <div style="width: 120px; height: 68px; background: ${getStyleColor(video.style)}; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i class="fas fa-play" style="color: white; font-size: 20px;"></i>
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <h4 style="font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${video.title}</h4>
                            <div style="display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px;">
                                <span style="padding: 2px 8px; background: #f1f5f9; border-radius: 4px; font-size: 11px; color: #64748b; text-transform: capitalize;">${video.style}</span>
                                <span style="padding: 2px 8px; background: #f1f5f9; border-radius: 4px; font-size: 11px; color: #64748b;">${video.duration}s</span>
                                <span style="padding: 2px 8px; background: #f1f5f9; border-radius: 4px; font-size: 11px; color: #64748b;">${video.createdAt}</span>
                            </div>
                            <button onclick="deleteVideo(${video.id})" style="padding: 6px 12px; background: #fee2e2; border: none; border-radius: 6px; cursor: pointer; color: #dc2626; font-size: 12px;">
                                <i class="fas fa-trash" style="margin-right: 4px;"></i>Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function getStyleColor(style) {
            const colors = {
                professional: 'linear-gradient(135deg, #1e293b, #334155)',
                casual: 'linear-gradient(135deg, #0f766e, #14b8a6)',
                energetic: 'linear-gradient(135deg, #7c3aed, #a855f7)'
            };
            return colors[style] || colors.professional;
        }

        function deleteVideo(id) {
            if (confirm('Delete this video?')) {
                videos = videos.filter(v => v.id !== id);
                localStorage.setItem('notebookVideos', JSON.stringify(videos));
                displayVideos();
            }
        }

        function clearAllVideos() {
            if (confirm('Delete all videos? This cannot be undone.')) {
                videos = [];
                localStorage.removeItem('notebookVideos');
                displayVideos();
            }
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #1e293b;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                z-index: 1000;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Load voices when available
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
