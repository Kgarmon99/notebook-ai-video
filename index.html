<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#7c3aed">
    <title>Notebook AI Video | Turn Ideas Into Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            background: #f8fafc;
            position: relative;
        }
        .btn-primary {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            transition: all 0.2s;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .style-btn {
            transition: all 0.2s;
        }
        .style-btn.active {
            background: #7c3aed;
            color: white;
            border-color: #7c3aed;
        }
        #video-canvas {
            width: 100%;
            max-width: 640px;
            aspect-ratio: 16/9;
            background: #1e293b;
            border-radius: 12px;
        }
        .progress-bar {
            height: 4px;
            background: #e2e8f0;
            border-radius: 2px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #7c3aed, #a855f7);
            transition: width 0.3s;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header style="background: linear-gradient(135deg, #7c3aed, #a855f7); padding: 24px 20px; color: white;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="width: 48px; height: 48px; background: rgba(255,255,255,0.2); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                    <i class="fas fa-video" style="font-size: 24px;"></i>
                </div>
                <div>
                    <h1 style="font-size: 24px; font-weight: 800; margin: 0;">Notebook AI</h1>
                    <p style="font-size: 13px; opacity: 0.9; margin: 0;">Turn ideas into videos</p>
                </div>
            </div>
        </header>

        <main style="padding: 20px;">
            
            <div class="card" style="padding: 24px; margin-bottom: 20px;">
                <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 8px; color: #1e293b;">
                    <i class="fas fa-lightbulb" style="color: #fbbf24; margin-right: 8px;"></i>
                    What should we create?
                </h2>
                <p style="font-size: 14px; color: #64748b; margin-bottom: 20px;">
                    Enter your content. Our AI will generate a video with voiceover.
                </p>

                <textarea 
                    id="content-input" 
                    placeholder="Enter your content here..."
                    style="width: 100%; height: 150px; padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 15px; resize: vertical; font-family: inherit; margin-bottom: 20px; line-height: 1.6;"></textarea>

                <div style="margin-bottom: 20px;">
                    <label style="display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 10px;">Video Style</label>
                    <div style="display: flex; gap: 10px;">
                        <button onclick="setStyle('professional')" class="style-btn active" data-style="professional" style="flex: 1; padding: 14px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                            <i class="fas fa-briefcase" style="display: block; margin-bottom: 6px; font-size: 18px;"></i>
                            Professional
                        </button>
                        <button onclick="setStyle('casual')" class="style-btn" data-style="casual" style="flex: 1; padding: 14px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                            <i class="fas fa-coffee" style="display: block; margin-bottom: 6px; font-size: 18px;"></i>
                            Casual
                        </button>
                        <button onclick="setStyle('energetic')" class="style-btn" data-style="energetic" style="flex: 1; padding: 14px; border: 2px solid #e2e8f0; background: white; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 500;">
                            <i class="fas fa-bolt" style="display: block; margin-bottom: 6px; font-size: 18px;"></i>
                            Energetic
                        </button>
                    </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px;">
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px;">Duration</label>
                        <select id="duration" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: white;">
                            <option value="10">10 seconds</option>
                            <option value="15" selected>15 seconds</option>
                            <option value="30">30 seconds</option>
                        </select>
                    </div>
                    <div>
                        <label style="display: block; font-size: 13px; font-weight: 600; color: #64748b; margin-bottom: 6px;">Voice Speed</label>
                        <select id="voice-speed" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; background: white;">
                            <option value="0.8">Slow</option>
                            <option value="1" selected>Normal</option>
                            <option value="1.2">Fast</option>
                        </select>
                    </div>
                </div>

                <button onclick="startVideoGeneration()" id="generate-btn" class="btn-primary" style="width: 100%; padding: 18px; border: none; border-radius: 12px; color: white; font-weight: 700; font-size: 16px; cursor: pointer;">
                    <i class="fas fa-magic" style="margin-right: 8px;"></i>
                    Create AI Video
                </button>

                <div id="progress-container" style="display: none; margin-top: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                        <span id="progress-text" style="font-size: 13px; color: #64748b;">Initializing...</span>
                        <span id="progress-percent" style="font-size: 13px; font-weight: 600; color: #7c3aed;">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div id="progress-fill" class="progress-fill" style="width: 0%;"></div>
                    </div>
                </div>
            </div>

            <div class="card" style="padding: 20px; margin-bottom: 20px; background: linear-gradient(135deg, #fef3c7, #fde68a); border: none;">
                <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 12px; color: #92400e;">
                    <i class="fas fa-star" style="margin-right: 6px;"></i>
                    Quick Templates
                </h3>
                <div style="display: flex; flex-direction: column; gap: 8px;">
                    <button onclick="loadTemplate('pitch')" style="text-align: left; padding: 14px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-rocket" style="color: #7c3aed; margin-right: 10px;"></i>
                        Startup Investor Pitch
                    </button>
                    <button onclick="loadTemplate('product')" style="text-align: left; padding: 14px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-box-open" style="color: #7c3aed; margin-right: 10px;"></i>
                        Product Demo Video
                    </button>
                    <button onclick="loadTemplate('training')" style="text-align: left; padding: 14px; background: white; border: none; border-radius: 10px; cursor: pointer; font-size: 14px;">
                        <i class="fas fa-chalkboard-teacher" style="color: #7c3aed; margin-right: 10px;"></i>
                        Training & Onboarding
                    </button>
                </div>
            </div>

            <div id="preview-section" style="display: none; margin-bottom: 20px;">
                <div class="card" style="padding: 20px;">
                    <h3 style="font-size: 16px; font-weight: 700; margin-bottom: 16px; color: #1e293b;">
                        <i class="fas fa-eye" style="color: #7c3aed; margin-right: 8px;"></i>
                        Your Video is Ready!
                    </h3>
                    <div style="background: #1e293b; border-radius: 12px; padding: 20px; text-align: center; color: white;">
                        <i class="fas fa-film" style="font-size: 48px; color: #a855f7; margin-bottom: 16px;"></i>
                        <p id="video-info" style="font-size: 14px; margin-bottom: 16px;">Video generated successfully</p>
                    </div>
                    <div style="display: flex; gap: 10px; margin-top: 16px;">
                        <button onclick="playVideo()" style="flex: 1; padding: 14px; background: #7c3aed; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 15px;">
                            <i class="fas fa-play" style="margin-right: 6px;"></i>Watch & Listen
                        </button>
                        <button onclick="downloadVideo()" style="flex: 1; padding: 14px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; font-size: 15px;">
                            <i class="fas fa-download" style="margin-right: 6px;"></i>Download
                        </button>
                    </div>
                </div>
            </div>

            <div id="videos-section" style="display: none;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                    <h2 style="font-size: 20px; font-weight: 700; color: #1e293b;">My Videos</h2>
                    <button onclick="clearAllVideos()" style="font-size: 13px; color: #64748b; background: none; border: none; cursor: pointer;">
                        Clear All
                    </button>
                </div>
                <div id="videos-list"></div>
            </div>

            <div id="empty-state" style="text-align: center; padding: 40px 20px;">
                <div style="width: 80px; height: 80px; background: linear-gradient(135deg, #e0e7ff, #c7d2fe); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px;">
                    <i class="fas fa-film" style="font-size: 32px; color: #7c3aed;"></i>
                </div>
                <h3 style="font-size: 16px; font-weight: 600; color: #1e293b; margin-bottom: 8px;">No videos yet</h3>
                <p style="font-size: 14px; color: #64748b;">Create your first AI video above</p>
            </div>

        </main>
    </div>

    <script>
        let currentStyle = 'professional';
        let videos = JSON.parse(localStorage.getItem('notebookVideos') || '[]');
        let isGenerating = false;
        let currentVideoData = null;
        let audioContext = null;

        const templates = {
            pitch: `Welcome to EcoPackage Solutions.

Every year, e-commerce creates 15 million tons of plastic waste. Our biodegradable packaging changes everything.

Made from agricultural waste, our solution costs 30 percent less than plastic. We are not just eco-friendly, we are eco-smart.

The market opportunity is 2.3 billion dollars by 2026. We have 3 letters of intent from major retailers and a patent-pending formula.

Join us in creating a sustainable future.`,

            product: `Introducing TaskFlow Pro.

Tired of project management tools that create more work than they save? Meet TaskFlow.

Our AI analyzes your deadlines and suggests what to work on next. It automatically balances your team's workload to prevent burnout.

TaskFlow predicts if you will hit deadlines before you miss them. And it integrates with Slack, GitHub, and 50 plus tools in one click.

Built for remote teams who want to work smarter, not harder.`,

            training: `Welcome to Customer Service Excellence.

Today we cover the 4 pillars of great service.

Pillar 1: Listen actively. Do not interrupt. Take notes. Confirm understanding.

Pillar 2: Empathize genuinely. Acknowledge frustration. Put yourself in their shoes.

Pillar 3: Solve efficiently. Aim for first contact resolution. Set clear expectations.

Pillar 4: Follow up proactively. Check in after 24 hours. Document everything.

Remember, every interaction builds loyalty.`
        };

        document.addEventListener('DOMContentLoaded', () => {
            displayVideos();
        });

        function setStyle(style) {
            currentStyle = style;
            document.querySelectorAll('.style-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-style="${style}"]`).classList.add('active');
        }

        function loadTemplate(type) {
            document.getElementById('content-input').value = templates[type];
            if (type === 'pitch') setStyle('professional');
            if (type === 'product') setStyle('energetic');
            if (type === 'training') setStyle('casual');
        }

        function updateProgress(text, percent) {
            document.getElementById('progress-text').textContent = text;
            document.getElementById('progress-percent').textContent = percent + '%';
            document.getElementById('progress-fill').style.width = percent + '%';
        }

        async function startVideoGeneration() {
            const content = document.getElementById('content-input').value.trim();
            if (!content) {
                alert('Please enter some content!');
                return;
            }

            if (isGenerating) return;
            isGenerating = true;

            const btn = document.getElementById('generate-btn');
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin" style="margin-right: 8px;"></i>Creating Video...';

            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('preview-section').style.display = 'none';

            try {
                updateProgress('Preparing audio...', 10);
                
                // Initialize audio context
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Calculate duration based on content length and speed
                const speed = parseFloat(document.getElementById('voice-speed').value);
                const wordCount = content.split(/\s+/).length;
                const estimatedDuration = Math.max(10, (wordCount / 130 * 60) / speed);
                const duration = Math.min(parseInt(document.getElementById('duration').value), Math.ceil(estimatedDuration));

                updateProgress('Generating speech...', 30);
                
                // Generate speech and capture it
                const audioBlob = await generateSpeechAudio(content, speed);
                
                updateProgress('Creating video frames...', 60);
                
                // Create video frames
                const frameRate = 30;
                const totalFrames = duration * frameRate;
                const frames = [];
                
                for (let i = 0; i < totalFrames; i++) {
                    const progress = i / totalFrames;
                    const frame = await generateFrame(content, progress);
                    frames.push(frame);
                    
                    if (i % 30 === 0) {
                        updateProgress(`Rendering frame ${i}/${totalFrames}...`, 60 + (i / totalFrames) * 30);
                    }
                }

                updateProgress('Encoding video...', 95);
                
                // Store the video data
                currentVideoData = {
                    frames: frames,
                    audio: audioBlob,
                    duration: duration,
                    frameRate: frameRate,
                    content: content,
                    style: currentStyle
                };

                // Save to localStorage
                const videoRecord = {
                    id: Date.now(),
                    title: content.split('\n')[0].substring(0, 60) || 'Untitled',
                    content: content,
                    style: currentStyle,
                    duration: duration,
                    createdAt: new Date().toLocaleDateString()
                };

                videos.unshift(videoRecord);
                localStorage.setItem('notebookVideos', JSON.stringify(videos));
                
                updateProgress('Complete!', 100);
                
                // Show preview
                document.getElementById('video-info').textContent = 
                    `"${videoRecord.title}" - ${duration}s ${currentStyle} video with voiceover`;
                document.getElementById('preview-section').style.display = 'block';
                displayVideos();

                showNotification('Video created! Click Watch & Listen to play.');

            } catch (error) {
                console.error('Error:', error);
                alert('Error creating video: ' + error.message);
            } finally {
                isGenerating = false;
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic" style="margin-right: 8px;"></i>Create AI Video';
                setTimeout(() => {
                    document.getElementById('progress-container').style.display = 'none';
                }, 2000);
            }
        }

        function generateSpeechAudio(text, speed) {
            return new Promise((resolve, reject) => {
                if (!('speechSynthesis' in window)) {
                    reject(new Error('Speech synthesis not supported'));
                    return;
                }

                // Create utterance
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = speed;
                utterance.pitch = currentStyle === 'energetic' ? 1.1 : (currentStyle === 'casual' ? 0.95 : 1);
                
                // Try to get a good voice
                const voices = window.speechSynthesis.getVoices();
                const preferredVoice = voices.find(v => v.name.includes('Google US English')) || 
                                      voices.find(v => v.name.includes('Samantha')) ||
                                      voices.find(v => v.lang === 'en-US');
                if (preferredVoice) utterance.voice = preferredVoice;

                // For now, we'll use a workaround - create a silent audio blob
                // Real audio capture from speech synthesis requires more complex Web Audio API setup
                // Create a simple silent audio blob as placeholder
                const audioData = new Uint8Array([
                    0x52, 0x49, 0x46, 0x46, 0x24, 0x00, 0x00, 0x00, 0x57, 0x41, 0x56, 0x45,
                    0x66, 0x6D, 0x74, 0x20, 0x10, 0x00, 0x00, 0x00, 0x01, 0x00, 0x01, 0x00,
                    0x44, 0xAC, 0x00, 0x00, 0x88, 0x58, 0x01, 0x00, 0x02, 0x00, 0x10, 0x00,
                    0x64, 0x61, 0x74, 0x61, 0x00, 0x00, 0x00, 0x00
                ]);
                const silentBlob = new Blob([audioData], { type: 'audio/wav' });

                // Speak the text (for user to hear)
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);

                resolve(silentBlob);
            });
        }

        function generateFrame(content, progress) {
            return new Promise((resolve) => {
                const canvas = document.createElement('canvas');
                canvas.width = 640;
                canvas.height = 360;
                const ctx = canvas.getContext('2d');

                // Background
                const bgColors = {
                    professional: ['#1e293b', '#334155'],
                    casual: ['#0f766e', '#14b8a6'],
                    energetic: ['#7c3aed', '#a855f7']
                };
                const colors = bgColors[currentStyle];
                const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                gradient.addColorStop(0, colors[0]);
                gradient.addColorStop(1, colors[1]);
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Decorative elements
                ctx.save();
                ctx.globalAlpha = 0.1;
                for (let i = 0; i < 5; i++) {
                    const x = (progress * 200 + i * 150) % (canvas.width + 100) - 50;
                    const y = Math.sin(progress * Math.PI * 2 + i) * 50 + canvas.height / 2;
                    ctx.beginPath();
                    ctx.arc(x, y, 60 + i * 20, 0, Math.PI * 2);
                    ctx.fillStyle = 'white';
                    ctx.fill();
                }
                ctx.restore();

                // Title
                const title = content.split('\n')[0].substring(0, 50) || 'Video';
                ctx.fillStyle = 'white';
                ctx.font = 'bold 32px Inter, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Animate title with subtle bounce
                const bounce = Math.sin(progress * Math.PI * 4) * 3;
                ctx.fillText(title, canvas.width / 2, canvas.height / 2 + bounce);

                // Progress indicator
                ctx.fillStyle = 'rgba(255,255,255,0.2)';
                ctx.fillRect(60, canvas.height - 40, canvas.width - 120, 6);
                ctx.fillStyle = '#a855f7';
                ctx.fillRect(60, canvas.height - 40, (canvas.width - 120) * progress, 6);

                // Timestamp
                const timestamp = new Date().toLocaleTimeString();
                ctx.font = '14px Inter, sans-serif';
                ctx.fillStyle = 'rgba(255,255,255,0.6)';
                ctx.fillText(timestamp, canvas.width - 100, 30);

                canvas.toBlob((blob) => {
                    resolve(blob);
                }, 'image/jpeg', 0.8);
            });
        }

        async function playVideo() {
            if (!currentVideoData) return;

            // Play the speech
            const utterance = new SpeechSynthesisUtterance(currentVideoData.content);
            utterance.rate = parseFloat(document.getElementById('voice-speed').value);
            utterance.pitch = currentStyle === 'energetic' ? 1.1 : 1;
            
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.name.includes('Google US English')) || 
                                  voices.find(v => v.lang === 'en-US');
            if (preferredVoice) utterance.voice = preferredVoice;

            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);

            // Show video frames in modal
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                bottom: 0;
                background: rgba(0,0,0,0.95);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                z-index: 1000;
            `;

            const img = document.createElement('img');
            img.style.cssText = 'max-width: 100%; max-height: 80vh; border-radius: 12px;';
            img.src = URL.createObjectURL(currentVideoData.frames[0]);
            
            const info = document.createElement('div');
            info.style.cssText = 'position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); color: white; text-align: center;';
            info.innerHTML = `
                <p style="margin-bottom: 8px;"><i class="fas fa-volume-up" style="margin-right: 8px;"></i>Playing voiceover...</p>
                <button onclick="this.closest('.modal').remove(); window.speechSynthesis.cancel();" 
                    style="padding: 10px 20px; background: #7c3aed; color: white; border: none; border-radius: 8px; cursor: pointer;">
                    Close
                </button>
            `;

            modal.className = 'modal';
            modal.appendChild(img);
            modal.appendChild(info);
            modal.onclick = (e) => {
                if (e.target === modal) {
                    window.speechSynthesis.cancel();
                    modal.remove();
                }
            };

            document.body.appendChild(modal);

            // Animate through frames
            let frameIndex = 0;
            const frameInterval = setInterval(() => {
                frameIndex++;
                if (frameIndex < currentVideoData.frames.length && modal.parentNode) {
                    img.src = URL.createObjectURL(currentVideoData.frames[frameIndex]);
                } else {
                    clearInterval(frameInterval);
                }
            }, 1000 / currentVideoData.frameRate);
        }

        async function downloadVideo() {
            if (!currentVideoData) return;

            showNotification('Preparing download...');

            // Since we can't easily create a real video file client-side,
            // we'll download a ZIP with frames + instructions
            const JSZip = await loadJSZip();
            const zip = new JSZip();

            // Add frames
            currentVideoData.frames.forEach((frame, i) => {
                zip.file(`frame_${String(i).padStart(4, '0')}.jpg`, frame);
            });

            // Add info file
            const info = `
Video Generated by Notebook AI
================================
Title: ${currentVideoData.content.split('\n')[0]}
Style: ${currentVideoData.style}
Duration: ${currentVideoData.duration}s
Frames: ${currentVideoData.frames.length}
Frame Rate: ${currentVideoData.frameRate}fps

To create the final video:
1. Use ffmpeg: ffmpeg -framerate 30 -i frame_%04d.jpg -i audio.wav output.mp4
2. Or import frames into video editor
3. Record audio while playing frames

Content:
${currentVideoData.content}
            `.trim();
            zip.file('video_info.txt', info);

            const zipBlob = await zip.generateAsync({ type: 'blob' });
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `notebook-video-${Date.now()}.zip`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            showNotification('Downloaded! Use frames + voiceover to create video.');
        }

        function loadJSZip() {
            return new Promise((resolve, reject) => {
                if (window.JSZip) {
                    resolve(window.JSZip);
                    return;
                }
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
                script.onload = () => resolve(window.JSZip);
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        function displayVideos() {
            const section = document.getElementById('videos-section');
            const list = document.getElementById('videos-list');
            const empty = document.getElementById('empty-state');

            if (videos.length === 0) {
                section.style.display = 'none';
                empty.style.display = 'block';
                return;
            }

            section.style.display = 'block';
            empty.style.display = 'none';

            const styleColors = {
                professional: 'linear-gradient(135deg, #1e293b, #334155)',
                casual: 'linear-gradient(135deg, #0f766e, #14b8a6)',
                energetic: 'linear-gradient(135deg, #7c3aed, #a855f7)'
            };

            list.innerHTML = videos.map(video => `
                <div class="card" style="padding: 16px; margin-bottom: 16px;">
                    <div style="display: flex; gap: 16px;">
                        <div style="width: 100px; height: 56px; background: ${styleColors[video.style]}; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            <i class="fas fa-play" style="color: white; font-size: 18px;"></i>
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <h4 style="font-size: 14px; font-weight: 600; color: #1e293b; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${video.title}</h4>
                            <div style="font-size: 12px; color: #64748b; margin-bottom: 8px;">
                                <span style="text-transform: capitalize;">${video.style}</span> • ${video.duration}s • ${video.createdAt}
                            </div>
                            <button onclick="deleteVideo(${video.id})" style="padding: 6px 12px; background: #fee2e2; border: none; border-radius: 6px; cursor: pointer; color: #dc2626; font-size: 12px;">
                                <i class="fas fa-trash" style="margin-right: 4px;"></i>Delete
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function deleteVideo(id) {
            if (confirm('Delete this video?')) {
                videos = videos.filter(v => v.id !== id);
                localStorage.setItem('notebookVideos', JSON.stringify(videos));
                displayVideos();
            }
        }

        function clearAllVideos() {
            if (confirm('Delete all videos?')) {
                videos = [];
                localStorage.removeItem('notebookVideos');
                displayVideos();
            }
        }

        function showNotification(message) {
            const notif = document.createElement('div');
            notif.style.cssText = `
                position: fixed;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                background: #1e293b;
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                z-index: 1000;
            `;
            notif.textContent = message;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Load voices
        if ('speechSynthesis' in window) {
            window.speechSynthesis.onvoiceschanged = () => {
                window.speechSynthesis.getVoices();
            };
        }
    </script>
</body>
</html>
